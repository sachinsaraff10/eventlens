version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: eventlens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Avant-garde100
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  api:
    build: 
      context: .
      dockerfile: ./api/Dockerfile
    command: node server.js
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  # worker:
  #   build: ./worker
  #   command: node worker.js
  #   env_file: .env
  #   depends_on:
  #     - postgres
  #     - redis

  ui:
    build: ./ui
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
